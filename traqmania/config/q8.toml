# 8-qubit profile: 7 lidar rays + speed = 8 features, one per qubit.
# UNTRAINED OPTION: no quantum_<track>_q8.npz weights are bundled; train first
# (attract/race/evolution/hardware stay unavailable until weights exist).

[circuit]
n_qubits = 8

[observation]
ray_angles_deg = [-60.0, -40.0, -20.0, 0.0, 20.0, 40.0, 60.0]
# Engineered-feature alternative: 3 rays + speed + all four track-aware
# inputs (still 8 features).  Uncomment all the lines below to activate:
# ray_angles_deg = [-60.0, 0.0, 60.0]
# features = ["rays", "speed", "curvature_ahead", "lateral_offset",
#             "heading_error", "corner_speed_ratio"]
